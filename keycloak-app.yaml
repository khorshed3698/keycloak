apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: keycloak
data:
  KEYCLOAK_USER: admin
  KEYCLOAK_PASSWORD: admin123

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 3 # সতর্কতা: PVC ব্যবহারের সময় ১টি রিপ্লিকা রাখা নিরাপদ (ReadWriteOnce এর জন্য)
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:21.1.1
          args:
            - start-dev
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KEYCLOAK_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KEYCLOAK_PASSWORD
          ports:
            - containerPort: 8080
          volumeMounts:           # কন্টেইনারের ভেতরে পাথ মাউন্ট করা
            - name: keycloak-data
              mountPath: /opt/keycloak/data
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:                    # পিভিসি কানেক্ট করা
        - name: keycloak-data
          persistentVolumeClaim:
            claimName: keycloak-db-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
spec:
  type: NodePort 
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: 8081     
      targetPort: 8080 
      nodePort: 30081
